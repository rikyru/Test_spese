version: '3.8'

services:
  finance_app:
    build: .
    container_name: finance_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./finance_data:/app/data
      - ./ocr_models:/root/.EasyOCR
    environment:
      - DB_PATH=/app/data/finance.duckdb
      - RULES_PATH=/app/data/rules.yaml
    restart: unless-stopped

  finance_api:
    build: ./finance_api
    container_name: finance_api
    ports:
      - "8502:8502"
    volumes:
      - ./finance_data:/app/data:ro
    environment:
      - DB_PATH=/app/data/finance.duckdb
    restart: unless-stopped
